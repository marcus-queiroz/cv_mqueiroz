<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CV · Marcus Queiroz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root { --ink: #111; --paper: #fafaf7; --mute: #8a8a86; --accent: #ffb628; }
  * { box-sizing: border-box; }
  html { font-size: 20px; }
  html, body { margin: 0; padding: 0; background: #f2f3f5; color: var(--ink); font-family: "Space Grotesk", system-ui, sans-serif; }

  /* ===== Chrome ===== */
  .chrome {
    position: sticky; top: 0; z-index: 50;
    background: #fafaf7; border-bottom: 1.5px solid #111;
    display: flex; align-items: stretch; justify-content: space-between;
    font-family: "Space Grotesk", system-ui, sans-serif;
  }
  .chrome-left { display: flex; align-items: center; gap: 12px; padding: 10px 16px; }
  .chrome-title { font-weight: 700; letter-spacing: -0.01em; font-size: 13px; }
  .lang-toggle { display: flex; border-left: 1px solid #111; }
  .lang-toggle button {
    border: none; background: transparent; cursor: pointer; font-family: inherit;
    padding: 10px 14px; font-size: 12px; letter-spacing: 0.05em;
  }
  .lang-toggle button[aria-pressed="true"] { background: #111; color: #fafaf7; }

  /* ===== Piloto 4 — BI Dashboard ===== */
  .p4 {
    background: #f2f3f5; color: #222; font-family: "Space Grotesk", system-ui, sans-serif;
    padding: 18px 14px 60px; min-height: calc(100vh - 44px);
  }
  .p4-wrap { max-width: 1180px; margin: 0 auto; }
  .p4-bar {
    background: #111; color: #fff; padding: 10px 16px; display: flex;
    justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0;
    font-size: 13px;
  }
  .p4-bar .left { display: flex; align-items: center; gap: 14px; }
  .p4-logo {
    width: 26px; height: 26px; border-radius: 4px; background: #ffb628;
    display: grid; place-items: center; color: #111; font-weight: 800; font-size: 14px;
  }
  .p4-crumbs { color: #bbb; font-size: 12px; }
  .p4-crumbs b { color: #fff; }
  .p4-bar .right { display: flex; gap: 8px; font-size: 11px; }
  .p4-bar .right span { background: #2a2a2a; padding: 4px 8px; border-radius: 3px; }
  .p4-canvas {
    background: #fff; border: 1px solid #d8d8d6; border-top: none;
    padding: 18px; border-radius: 0 0 6px 6px;
  }
  .p4-filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    padding-bottom: 14px; border-bottom: 1px dashed #ccc;
  }
  .p4-filter {
    background: #f6f7f9; border: 1px solid #dcdcda; border-radius: 3px;
    padding: 4px 10px; font-size: 11.5px; display: flex; gap: 6px; align-items: center;
  }
  .p4-filter .k { color: #888; }
  .p4-filter .v { color: #111; font-weight: 600; }
  .p4-filter.active { background: #ffb628; border-color: #111; }

  .p4-grid {
    display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px;
    grid-auto-rows: min-content;
  }
  .p4-card {
    background: #fff; border: 1px solid #e2e2de; border-radius: 4px;
    padding: 12px 14px; position: relative;
  }
  .p4-card h4 {
    margin: 0 0 6px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: #666;
  }
  .p4-kpi { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .p4-kpi .unit { font-size: 14px; color: #888; font-weight: 500; margin-left: 4px; }
  .p4-delta { font-size: 11px; color: #2a9d4a; margin-top: 2px; }
  .p4-col-3 { grid-column: span 3; }
  .p4-col-4 { grid-column: span 4; }
  .p4-col-6 { grid-column: span 6; }
  .p4-col-8 { grid-column: span 8; }
  .p4-col-12 { grid-column: span 12; }
  .p4-bars { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
  .p4-bar-row { display: grid; grid-template-columns: 100px 1fr 40px; gap: 8px; align-items: center; font-size: 11.5px; }
  .p4-bar-track { background: #f0f0ec; height: 14px; border-radius: 2px; overflow: hidden; }
  .p4-bar-fill { height: 100%; background: #ffb628; }
  .p4-bar-fill.alt { background: #3e6fe0; }
  .p4-bar-num { text-align: right; font-variant-numeric: tabular-nums; color: #555; font-size: 11px; }
  .p4-timeline { position: relative; padding: 10px 0; }
  .p4-tl-axis { position: relative; height: 2px; background: #111; margin: 30px 10px; }
  .p4-tl-tick { position: absolute; top: -4px; width: 2px; height: 10px; background: #111; }
  .p4-tl-year { position: absolute; top: 14px; transform: translateX(-50%); font-size: 10px; color: #666; font-variant-numeric: tabular-nums; }
  .p4-tl-job {
    position: absolute; top: -30px; transform: translateX(-50%);
    font-size: 10px; white-space: nowrap; text-align: center;
  }
  .p4-tl-job b { display: block; color: #111; }
  .p4-tl-job span { color: #888; }
  .p4-tl-dot { width: 10px; height: 10px; background: #ffb628; border: 2px solid #111; border-radius: 50%; position: absolute; top: -4px; transform: translateX(-50%); }
  .p4-jobtable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .p4-jobtable th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #111; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #666; font-weight: 600; }
  .p4-jobtable td { padding: 8px; border-bottom: 1px dashed #e0e0dc; vertical-align: top; }
  .p4-jobtable td.co { font-weight: 600; }
  .p4-chip { display: inline-block; background: #f0f0ec; border: 1px solid #dcdcda; padding: 2px 7px; font-size: 10.5px; border-radius: 2px; margin: 1px 2px; }

  @media (max-width: 760px) {
    .chrome { flex-direction: column; align-items: stretch; }
    .chrome-left { padding: 8px 12px; }
    .p4-col-3, .p4-col-4, .p4-col-6, .p4-col-8 { grid-column: span 12; }
  }
</style>
</head>
<body>

<header class="chrome">
  <div class="chrome-left">
    <span class="chrome-title">CV · Marcus Queiroz</span>
  </div>
  <div class="lang-toggle" role="group" aria-label="Language">
    <button data-lang="pt" aria-pressed="true">PT</button>
    <button data-lang="en" aria-pressed="false">EN</button>
  </div>
</header>

<main id="cv"></main>

<script src="data.js"></script>
<script>
  let lang = localStorage.getItem("cv_lang") || "pt";

  function t(pt, en) { return lang === "pt" ? pt : en; }

  function render() {
    const d = CV_DATA;
    const skillsObj = d.skills[lang];

    const skillBars = [
      { label: "Power BI / DAX",      value: 92, color: "ffb628" },
      { label: "SQL Server / SSIS",   value: 95, color: "ffb628" },
      { label: "SSAS Tabular",        value: 80, color: "ffb628" },
      { label: "Azure Data Factory",  value: 70, color: "3e6fe0" },
      { label: "Databricks / Spark",  value: 55, color: "3e6fe0" },
      { label: "Python / PySpark",    value: 60, color: "3e6fe0" },
      { label: "Looker / BigQuery",   value: 40, color: "3e6fe0" },
    ];

    const barRows = skillBars.map(b => `
      <div class="p4-bar-row">
        <span>${b.label}</span>
        <div class="p4-bar-track"><div class="p4-bar-fill ${b.color === "3e6fe0" ? "alt" : ""}" style="width:${b.value}%"></div></div>
        <span class="p4-bar-num">${b.value}</span>
      </div>`).join("");

    const expFiltered = d.experience.filter(e =>
      !["Construtora Central do Brasil", "Tenaris Confab"].includes(e.company)
    );

    const jobRows = expFiltered.map(e => {
      const role = typeof e.role === "string" ? e.role : t(e.role.pt, e.role.en);
      const endv = typeof e.end === "string" ? e.end : t(e.end.pt, e.end.en);
      const bullets = t(e.bullets.pt, e.bullets.en);
      return `<tr>
        <td class="co">${e.company}${e.client ? ` <span style="color:#888;font-weight:400">· ${t(e.client.pt, e.client.en)}</span>` : ""}</td>
        <td>${role}</td>
        <td style="white-space:nowrap">${e.start} → ${endv}</td>
        <td>${bullets.map(b => `• ${b}`).join("<br/>")}</td>
      </tr>`;
    }).join("");

    const startYear = 2018, endYear = 2026, span = endYear - startYear;
    const years = [];
    for (let y = startYear; y <= endYear; y++) years.push(y);
    const jobMarkers = [
      { y: 2018.5, short: "K2M" },
      { y: 2019.5, short: "Growth2data" },
      { y: 2021.5, short: "Radix" },
      { y: 2022.5, short: "Programmers" },
      { y: 2023.5, short: "MTP / WTW" },
    ];

    document.getElementById("cv").innerHTML = `
<div class="p4">
  <div class="p4-wrap">
    <div class="p4-bar">
      <div class="left">
        <div class="p4-logo">M</div>
        <div class="p4-crumbs">Workspace / CV / <b>marcus_queiroz.pbix</b></div>
      </div>
    </div>
    <div class="p4-canvas">

      <div class="p4-filters">
<div class="p4-filter"><span class="k">${t("modalidade", "mode")}</span><span class="v">remoto · híbrido</span></div>
        <div class="p4-filter"><span class="k">${t("localização", "location")}</span><span class="v">${t(d.location.pt, d.location.en)}</span></div>
        <div class="p4-filter"><span class="k">${t("foco", "focus")}</span><span class="v">BI · Data Eng</span></div>
      </div>

      <div class="p4-grid">
        <div class="p4-card p4-col-12">
          <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;">
            <div>
              <div style="font-size:26px;font-weight:700;letter-spacing:-0.02em;">${d.name}</div>
              <div style="color:#666;font-size:13px;margin-top:3px;">${t(d.headline.pt, d.headline.en)}</div>
            </div>
            <div style="font-size:12px;color:#555;text-align:right;line-height:1.7;">
              ${t(d.location.pt, d.location.en)}<br/>
              ${d.email} · ${d.linkedin} · ${d.github}
            </div>
          </div>
          <div style="margin-top:10px;font-size:12.5px;color:#333;line-height:1.6;max-width:860px;">${t(d.summary.pt, d.summary.en)}</div>
        </div>

        <div class="p4-card p4-col-12">
          <h4>${t("Trajetória", "Career Timeline")}</h4>
          <div class="p4-timeline">
            <div class="p4-tl-axis">
              ${years.map(y => {
                const pct = ((y - startYear) / span) * 100;
                return `<div class="p4-tl-tick" style="left:${pct}%"></div>
                        <div class="p4-tl-year" style="left:${pct}%">${y}</div>`;
              }).join("")}
              ${jobMarkers.map(j => {
                const pct = ((j.y - startYear) / span) * 100;
                return `<div class="p4-tl-dot" style="left:${pct}%"></div>
                        <div class="p4-tl-job" style="left:${pct}%"><b>${j.short}</b></div>`;
              }).join("")}
            </div>
          </div>
        </div>

        <div class="p4-card p4-col-6">
          <h4>${t("Proficiência por tecnologia", "Proficiency by technology")}</h4>
          <div style="font-size:10.5px;color:#888;margin-bottom:8px;">
            <span style="display:inline-block;width:10px;height:10px;background:#ffb628;margin-right:4px;"></span>${t("BI clássico", "Classic BI")}
            &nbsp;&nbsp;
            <span style="display:inline-block;width:10px;height:10px;background:#3e6fe0;margin-right:4px;"></span>${t("Data moderno", "Modern data")}
          </div>
          <div class="p4-bars">${barRows}</div>
        </div>

        <div class="p4-card p4-col-6">
          <h4>${t("Stack completa", "Full stack")}</h4>
          <div style="margin-top:4px;">
            ${Object.entries(skillsObj).map(([k, v]) => `
              <div style="margin-bottom:10px;">
                <div style="font-size:10.5px;color:#666;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">${k}</div>
                ${v.map(x => `<span class="p4-chip">${x}</span>`).join("")}
              </div>`).join("")}
          </div>
        </div>

        <div class="p4-card p4-col-12">
          <h4>${t("Experiência detalhada", "Detailed experience")}</h4>
          <table class="p4-jobtable">
            <thead><tr>
              <th>${t("Empresa", "Company")}</th>
              <th>${t("Cargo", "Role")}</th>
              <th>${t("Período", "Period")}</th>
              <th>${t("Entregas", "Deliverables")}</th>
            </tr></thead>
            <tbody>${jobRows}</tbody>
          </table>
        </div>

        <div class="p4-card p4-col-6">
          <h4>${d.labels[lang].education}</h4>
          <div style="font-size:13px;margin-top:4px;">${t(d.education.pt, d.education.en)}</div>
        </div>
        <div class="p4-card p4-col-6">
          <h4>${d.labels[lang].contact}</h4>
          <div style="font-size:12.5px;line-height:1.7;margin-top:4px;">
            <b>${d.email}</b><br/>
            ${d.linkedin}<br/>
            ${d.github}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>`;

    document.documentElement.lang = lang;
    document.querySelectorAll(".lang-toggle button").forEach(b =>
      b.setAttribute("aria-pressed", b.dataset.lang === lang));
  }

  document.querySelectorAll(".lang-toggle button").forEach(btn => {
    btn.addEventListener("click", () => {
      lang = btn.dataset.lang;
      localStorage.setItem("cv_lang", lang);
      render();
    });
  });

  render();
</script>

</body>
</html>
